<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Cards · The Frequency Academy</title>
<meta name="description" content="Quote cards from The Frequency Academy — wisdom drops, teachings, and sovereign declarations.">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0D1240;
    color: #e8dcc4;
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    background-image: radial-gradient(circle at 50% 0%, rgba(201, 168, 76, 0.12) 0%, transparent 55%);
  }
  header { text-align: center; margin-bottom: 40px; }
  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 500;
    color: #c9a84c;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .subtitle {
    color: rgba(232, 220, 196, 0.6);
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-family: monospace;
  }
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .card-tile {
    position: relative;
    aspect-ratio: 4/5;
    overflow: hidden;
    border-radius: 4px;
    border: 1px solid rgba(201, 168, 76, 0.2);
    background: #0a0a18;
  }
  .card-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  footer {
    margin-top: 40px;
    text-align: center;
    color: rgba(232, 220, 196, 0.4);
    font-size: 12px;
    letter-spacing: 0.2em;
    font-family: monospace;
  }
  footer a { color: #c9a84c; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>✶ Quote Cards</h1>
  <div class="subtitle">The Frequency Academy</div>
</header>
<div class="grid" id="grid"></div>
<footer>
  <a href="https://thefrequencyacademy.net">← thefrequencyacademy.net</a>
</footer>

</body>
</html>
